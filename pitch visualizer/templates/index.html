<!DOCTYPE html>
<html>
<head>
    <title>Pitch Visualizer</title>
</head>
<body>

<h2>Pitch Visualizer: Text → Storyboard</h2>

<form method="POST">
    <textarea name="text" rows="6" cols="60" placeholder="Enter your story..."></textarea><br><br>

    <label>Select Style:</label>
    <select name="style">
        <option value="realistic">Realistic</option>
        <option value="cartoon">Cartoon</option>
        <option value="anime">Anime</option>
    </select><br><br>

    <button type="submit">Generate Storyboard</button>
</form>

<hr>

{% for i in range(images|length) %}
    <h3>Scene {{ i+1 }}</h3>
    <p>{{ scenes[i] }}</p>
    <img src="{{ images[i] }}" width="300"><br><br>
{% endfor %}

</body>
</html>
